version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medicalnote
      POSTGRES_USER: medicalnote
      POSTGRES_PASSWORD: medicalnote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicalnote"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: medicalnote
      DB_USER: medicalnote
      DB_PASSWORD: medicalnote
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      FIELD_ENCRYPTION_KEY: "local-dev-encryption-key-32-bytes-pad="
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: >
      celery -A config worker -l info
      -Q default,transcription,soap_note,summary,ocr
      --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: medicalnote
      DB_USER: medicalnote
      DB_PASSWORD: medicalnote
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      FIELD_ENCRYPTION_KEY: "local-dev-encryption-key-32-bytes-pad="
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: medicalnote
      DB_USER: medicalnote
      DB_PASSWORD: medicalnote
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FIELD_ENCRYPTION_KEY: "local-dev-encryption-key-32-bytes-pad="
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
